
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrewJC | Coffee & More</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #faf8f6;
      color: #333;
    }

    /* Navbar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: #3e2723;
      color: white;
    }

    header h1 {
      font-size: 24px;
      letter-spacing: 2px;
    }

    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: white;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ffcc80;
    }

    /* Hero Section */
    .hero {
      height: 90vh;
      background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 30px;
      background: #ffcc80;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ffa726;
    }

    /* Products Section */
    .products {
      padding: 60px;
      text-align: center;
    }

    .products h2 {
      margin-bottom: 40px;
      font-size: 32px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    .price {
      color: #6d4c41;
      font-weight: bold;
    }

    /* Footer */
    footer {
      background: #3e2723;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }

    /* Responsive */
    @media(max-width: 768px) {
      header {
        flex-direction: column;
      }

      nav {
        margin-top: 10px;
      }
    }

  </style>
</head>

<body>

  <!-- Navbar -->
  <header>
    <h1>BrewJC ☕</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <div>
      <h2>Freshly Brewed Happiness</h2>
      <p>Discover premium coffee & handcrafted merchandise</p>
      <button class="btn">Shop Now</button>
    </div>
  </section>

  <!-- Products -->
  <section class="products">
    <h2>Our Best Sellers</h2>

    <div class="product-grid">
      
      <div class="card">
        <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348">
        <h3>Espresso Blend</h3>
        <p class="price">₹499</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
        <h3>Cold Brew Kit</h3>
        <p class="price">₹799</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1521305916504-4a1121188589">
        <h3>Coffee Mug</h3>
        <p class="price">₹299</p>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085">
        <h3>French Press</h3>
        <p class="price">₹999</p>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 BrewJC | Crafted with ❤️ for coffee lovers</p>
  </footer>

</body>
</html>
